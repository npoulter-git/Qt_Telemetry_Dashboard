<svg xmlns="http://www.w3.org/2000/svg" width="80" height="220" viewBox="0 0 80 220">

  <g stroke="white" stroke-width="2" fill="none" font-family="Arial" font-size="12">

    <!-- +30 -->
    <line x1="0" y1="20" x2="55" y2="20"></line>
    <text x="60" y="24" fill="white">30</text>

    <!-- +20 -->
    <line x1="0" y1="60" x2="45" y2="60"></line>
    <text x="50" y="64" fill="white">20</text>

    <!-- +10 -->
    <line x1="0" y1="100" x2="35" y2="100"></line>
    <text x="40" y="104" fill="white">10</text>

    <!-- Horizon -->
    <line x1="0" y1="110" x2="65" y2="110" stroke-width="3"></line>

    <!-- -10 -->
    <line x1="0" y1="120" x2="35" y2="120"></line>
    <text x="40" y="124" fill="white">10</text>

    <!-- -20 -->
    <line x1="0" y1="160" x2="45" y2="160"></line>
    <text x="50" y="164" fill="white">20</text>

    <!-- -30 -->
    <line x1="0" y1="200" x2="55" y2="200"></line>
    <text x="60" y="204" fill="white">30</text>

  </g>
</svg>