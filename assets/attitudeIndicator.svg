<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <clipPath id="clip">
      <circle cx="128" cy="128" r="110"></circle>
    </clipPath>
  </defs>

  <!-- Outer bezel -->
  <circle cx="128" cy="128" r="118" fill="#222" stroke="#111" stroke-width="4"></circle>
  <circle cx="128" cy="128" r="110" fill="#000"></circle>

  <!-- Rotating horizon -->
  <g clip-path="url(#clip)" transform="rotate(-20 128 128)">
    <!-- Sky -->
    <rect x="-50" y="-50" width="400" height="178" fill="#4A90E2"></rect>
    <!-- Ground -->
    <rect x="-50" y="128" width="400" height="178" fill="#9C6B30"></rect>
    <!-- Horizon -->
    <line x1="-50" y1="128" x2="350" y2="128" stroke="white" stroke-width="4"></line>
  </g>

  <!-- Pitch ladder -->
  <g stroke="white" stroke-width="2" stroke-linecap="round">
    <line x1="88" y1="108" x2="168" y2="108"></line>
    <line x1="98" y1="88" x2="158" y2="88"></line>
    <line x1="98" y1="148" x2="158" y2="148"></line>
    <line x1="108" y1="68" x2="148" y2="68"></line>
    <line x1="108" y1="188" x2="148" y2="188"></line>
  </g>

  <!-- Fixed aircraft symbol -->
  <g stroke="#FFD400" stroke-width="5" stroke-linecap="round" fill="none">
    <line x1="68" y1="128" x2="110" y2="128"></line>
    <line x1="146" y1="128" x2="188" y2="128"></line>
    <line x1="110" y1="128" x2="120" y2="136"></line>
    <line x1="146" y1="128" x2="136" y2="136"></line>
    <line x1="128" y1="120" x2="128" y2="146"></line>
  </g>

  <!-- Bank angle pointer -->
  <polygon points="128,24 122,36 134,36" fill="white"></polygon>

  <!-- Bezel markings -->
  <g stroke="white" stroke-width="2">
    <line x1="128" y1="18" x2="128" y2="30"></line>
    <line x1="52" y1="52" x2="60" y2="60"></line>
    <line x1="204" y1="52" x2="196" y2="60"></line>
  </g>
</svg>